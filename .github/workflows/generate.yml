name: Generate Wish Pages

on:
  push:
    paths:
      - 'topics.csv'        # Only runs when CSV changes
  workflow_dispatch:         # Also allow manual trigger

permissions:
  contents: write            # Needed to push generated files back

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate.py

      - name: Commit and push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/ index.html
          git diff --staged --quiet || git commit -m "Auto-generate pages from topics.csv"
          git push